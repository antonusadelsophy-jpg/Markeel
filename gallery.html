<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gallery | Markeel Art</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background:#490000ed;
    color: white;
}

/* Navbar */
.navbar {
    background:#0000007d;
    padding: 15px;
    border-radius:200px;
    text-align: center;
}
.navbar a {
    color:#00efe2;
    margin: 0 15px;
    text-decoration: none;
    font-size: 18px;
}
.navbar a:hover {
    color: gold;
}

/* Title */
h1 {
    text-align: center;
    margin: 30px 0;
}

/* Gallery Grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* Card */
.card {
    background: #1c1c1c;
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* Image */
.card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

/* Info */
.info {
    padding: 15px;
    text-align: center;
}

.price {
    color: gold;
    font-size: 18px;
    margin: 10px 0;
}

/* Button */
button {
    background: gold;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
    border-radius: 10px;
    font-weight: bold;
}

button:hover {
    background: orange;
}
.a1{text-decoration:none;
  color:red;
  background:green;
  text-align:center;
  margin-top:20px;
  padding: 12px;
  display:block;
  border-radius:10px ;
  cursor:pointer;

}

/* الصندوق */
.slider{
    width: 300px;
    height: 400px;
    border-radius: 20px;
    box-shadow: 0 0 30px #00ff;
    margin-left:35px;
    background-size: cover;
    background-position: center;
    animation: slide 20s linear infinite;
  animation-delay:1s;
}

/* الحركة */
@keyframes slide{

    0%{
        background-image: url("an6.jpg");
    }

    25%{
        background-image: url("a2.jpg");
    }
    40%{
        background-image: url("an5.jpg");
    }

    50%{
        background-image: url("a7.jpg");
    }

    75%{
        background-image: url("a5.jpg");
    }

    100%{
        background-image: url("an1.jpg");
    }
</style>

</head>
<body>

<div class="navbar">
    <a href="index.html">الرئيسية</a>
    <a href="images.html">صور بورتريه</a>
    <a href="contact.html">تواصل</a>
</div>

<h1>🎨 معرض اللوحات</h1>
<div class="slider"></div>

<div class="gallery">

    <!-- لوحة 1 -->
    <div class="card">
        <img src="as.png" alt="لوحة غروب الشمس">
        <div class="info">
            <h3>غروب الشمس</h3>
            <p class="price">500 جنيه</p>
            <button onclick="addToCart('غروب الشمس')">أضف للسلة</button>
        </div>
    </div>

    <!-- لوحة 2 -->
    <div class="card">
        <img src="an5.jpg" alt="لوحة كرتونية">
        <div class="info">
            <h3>رسومات كرتونية</h3>
            <p class="price">499 جنيه</p>
            <button onclick="addToCart('رسومات كرتونية')">ضف للسلة</button>
        </div>
    </div>

    <!-- لوحة 3 -->
    <div class="card">
        <img src="an1.jpg" alt="لوحة عصفور">
        <div class="info">
            <h3>لوحة عصفور</h3>
            <p class="price">499 جنيه</p>
            <button onclick="addToCart('لوحة عصفور')">أضف للسلة</button>
        </div>
    </div>

</div>
<a class="a1" href="contact.html">تواصل معانا</a>
<script>
function addToCart(item) {
    alert(item + " تم إضافتها للسلة 🛒");
}
</script>

</body>
</html>
